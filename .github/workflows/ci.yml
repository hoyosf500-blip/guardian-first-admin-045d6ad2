name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Lint
        run: npx eslint src/lib/ src/hooks/ src/contexts/ --max-warnings 0
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
